<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aktu connect</title>
    <link rel="stylesheet" href="goal.css".css">
</head>
<body>
    <div class="container">
        <h1>Welcome To AKTU Connect</h1>
        <h3>Select Semester</h3>
        <select id="semester">
            <option value="">--Select Semester--</option>
            <option value="1">1st</option>
            <option value="2">2nd</option>
            <option value="3">3rd</option>
            <option value="4">4th</option>
            <option value="5">5th</option>
            <option value="6">6th</option>
            <option value="7">7th</option>
            <option value="8">8th</option>
        </select>
        <h3>Select Branch</h3>
        <select id="branch">
             <option value="">--Select Branch--</option>
             <option value="CSE">CSE</option>
             <option value="IT">IT</option>
             <option value="ECE">ECE</option>
             <option value="ME">ME</option>
             <option value="CE">CE</option>
        </select>
        <h3>Target CGPA</h3>
        <label><input type="radio" name="cgpa" value="6">6+</label>
        <label><input type="radio" name="cgpa" value="7">7+</label>
        <label><input type="radio" name="cgpa" value="8">8+</label>
        <label><input type="radio" name="cgpa" value="9">9+</label>
        
        <br><br>
        <button id="startbtn">⭐Start My Journey</button>
        <p id="msg"></p>

    </div>
    <script src="goal.js"></script>
</body>
</html>
